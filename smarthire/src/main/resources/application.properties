# ===================================================================
# Data Source Configuration
# ===================================================================
# JDBC URL for the MySQL database (default port is 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/smarthire?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Database Credentials
spring.datasource.username=root
spring.datasource.password=root

# Modern MySQL Driver class (automatically inferred by Spring Boot)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
# DD-Auto strategy (update, create, create-drop, validate, or none)
spring.jpa.hibernate.ddl-auto=update

# Explicitly define the MySQL dialect (optional in newer Spring Boot versions)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Show SQL queries executed in the console (useful for development)
spring.jpa.show-sql=true

# Format the logged SQL for better readability
spring.jpa.properties.hibernate.format_sql=true
